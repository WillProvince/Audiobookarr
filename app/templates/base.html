<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Audiobookarr{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="{{ url_for('books.index') }}">🎧 Audiobookarr</a>
    </div>
    <ul class="navbar-menu">
      <li><a href="{{ url_for('books.index') }}" {% if request.endpoint == 'books.index' %}class="active"{% endif %}>Library</a></li>
      <li><a href="{{ url_for('books.search_page') }}" {% if request.endpoint == 'books.search_page' %}class="active"{% endif %}>Search</a></li>
      <li><a href="{{ url_for('settings.settings_page') }}" {% if request.endpoint == 'settings.settings_page' %}class="active"{% endif %}>Settings</a></li>
    </ul>
  </nav>

  <main class="container">
    <div id="alert-container"></div>
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
